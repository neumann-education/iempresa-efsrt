<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - Instituto Empresa</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #ffffff;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
        border-radius: 1rem;
        background-color: #fff;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border: 1px solid #e9e6f7;
      }
      .login-title {
        font-weight: 700;
        color: #111827;
        margin-bottom: 2rem;
        text-align: center;
      }
      .login-title i {
        color: #6d42b9;
      }
      .form-floating label {
        color: #6c757d;
      }
      .btn-primary {
        background-color: #6d42b9;
        border-color: #6d42b9;
        font-weight: 600;
        padding: 0.75rem;
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        background-color: #512a7a;
        border-color: #512a7a;
      }
      .spinner-border-sm {
        width: 1rem;
        height: 1rem;
        border-width: 0.15em;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h3 class="login-title">
        <i class="fas fa-user-circle me-2"></i>Inicio de Sesión
      </h3>

      <div
        id="loginAlert"
        style="display: none"
        class="alert alert-danger py-2 mb-3 small"
        role="alert"
      ></div>

      <form id="loginForm">
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Usuario"
            required
          />
          <label for="username">Usuario</label>
        </div>
        <div class="form-floating mb-4 position-relative">
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Contraseña"
            required
            style="padding-right: 40px"
          />
          <label for="password">Contraseña</label>
          <span
            id="togglePassword"
            class="position-absolute top-50 end-0 translate-middle-y me-3 text-secondary"
            style="cursor: pointer; z-index: 10"
          >
            <i class="fas fa-eye"></i>
          </span>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="loginBtn">
          <span id="btnText">Ingresar</span>
          <div
            id="btnSpinner"
            class="spinner-border spinner-border-sm ms-2"
            role="status"
            style="display: none"
          >
            <span class="visually-hidden">Cargando...</span>
          </div>
        </button>
      </form>
    </div>

    <script>
      const API_URL =
        'https://script.google.com/macros/s/AKfycbw0XJcMKV6mXnnK827GoUTGNB5cYaKKG-rnbtT-3kRIfjArlVFfrmAnHUpE7wFPHZwTiQ/exec'
      const MAIN_PAGE = 'index.html'

      // Limpiar inputs al cargar
      document.getElementById('username').value = ''
      document.getElementById('password').value = ''

      // Toggle Password Visibility
      const togglePassword = document.querySelector('#togglePassword')
      const password = document.querySelector('#password')

      togglePassword.addEventListener('click', function (e) {
        // toggle the type attribute
        const type =
          password.getAttribute('type') === 'password' ? 'text' : 'password'
        password.setAttribute('type', type)
        // toggle the eye slash icon
        this.querySelector('i').classList.toggle('fa-eye-slash')
        this.querySelector('i').classList.toggle('fa-eye')
      })

      document
        .getElementById('loginForm')
        .addEventListener('submit', async function (e) {
          e.preventDefault()

          const user = document.getElementById('username').value
          const pass = document.getElementById('password').value
          const btn = document.getElementById('loginBtn')
          const btnText = document.getElementById('btnText')
          const btnSpinner = document.getElementById('btnSpinner')
          const alertBox = document.getElementById('loginAlert')

          // Reset UI
          alertBox.style.display = 'none'
          btn.disabled = true
          btnText.textContent = 'Verificando...'
          btnSpinner.style.display = 'inline-block'

          try {
            // Usamos x-www-form-urlencoded para coincidir con la estructura actual de tu backend
            const formData = new URLSearchParams()
            formData.append('username', user)
            formData.append('password', pass)

            // IMPORTANTE: En la query string pasamos ?action=login para que el backend sepa qué hacer
            const response = await fetch(`${API_URL}?action=login`, {
              method: 'POST',
              body: formData,
              // No hace falta content-type explícito con URLSearchParams, fetch lo pone solo
            })

            const result = await response.json()

            if (result.success) {
              // Guardar sesión
              sessionStorage.setItem('isLoggedIn', 'true')
              sessionStorage.setItem('user', result.user || user)
              sessionStorage.setItem('authToken', result.token) // Guardar Token

              // Redirigir
              window.location.href = MAIN_PAGE
            } else {
              throw new Error(result.message || 'Credenciales incorrectas')
            }
          } catch (error) {
            console.error(error)
            alertBox.textContent = error.message.includes('Failed to fetch')
              ? 'Error de conexión. Verifique su internet.'
              : error.message || 'Error al iniciar sesión'
            alertBox.style.display = 'block'

            btn.disabled = false
            btnText.textContent = 'Ingresar'
            btnSpinner.style.display = 'none'
          }
        })
    </script>
  </body>
</html>
